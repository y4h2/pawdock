version: "3"

tasks:
  build:
    desc: Build for current platform
    cmds:
      - go build -ldflags="-s -w" -o pawdock .

  build:windows:
    desc: Cross-compile for Windows (amd64)
    cmds:
      - CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H windowsgui" -o pawdock-windows-amd64.exe .

  release:
    desc: "Create a git tag from CHANGELOG.md. Usage: task release -- v0.2.0"
    cmds:
      - |
        VERSION="{{.CLI_ARGS}}"
        if [ -z "$VERSION" ]; then echo "Usage: task release -- v0.2.0"; exit 1; fi
        NOTES=$(awk "/^## $VERSION/{found=1; next} /^## /{found=0} found" CHANGELOG.md)
        if [ -z "$NOTES" ]; then echo "Error: no entry for $VERSION in CHANGELOG.md"; exit 1; fi
        echo "=== Tag $VERSION ==="
        echo "$NOTES"
        echo "===================="
        git tag -a "$VERSION" -m "$VERSION
        $NOTES"
        echo "Tag $VERSION created. Push with: git push origin $VERSION"
